[profile.release]
lto = "thin"
codegen-units = 1

[profile.release-with-debug]
inherits = "release"
debug = true
# Prioritize compile time over runtime performance
codegen-units = 16
lto = "thin"

[target.'cfg(all())']
rustflags = [
    "-Wclippy::all",
    "-Wclippy::fallible_impl_from",
    "-Wclippy::manual_let_else",
    "-Wclippy::string_add_assign",
    "-Wclippy::string_add",
    "-Wclippy::string_lit_as_bytes",
    "-Wclippy::use_self",
    "-Aclippy::redundant_pub_crate", # PyO3 macros don't pass this.
]

[target.x86_64-unknown-linux-gnu]
# Lowered from haswell to x86-64-v2 so the binary runs on pre-Haswell CPUs
# (Sandy Bridge / Ivy Bridge), which only guarantee SSE4.2 globally. Hot
# AVX2 / FMA kernels in lance-linalg now carry their own
# #[target_feature(enable="avx,avx2,fma")] annotations and dispatch via
# SIMD_SUPPORT at runtime, so they remain fast on AVX2-capable hardware.
#
# Note: clippy lint flags for the Python crate live under
# `[target.'cfg(all())']` above so they merge across all targets. The
# `target-cpu` flag is target-specific.
rustflags = ["-C", "target-cpu=x86-64-v2"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=apple-m1", "-C", "target-feature=+neon,+fp16"]
