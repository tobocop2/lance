[profile.release]
lto = "fat"
codegen-units = 1

[profile.release-with-debug]
inherits = "release"
debug = true
# Prioritize compile time over runtime performance
codegen-units = 16
lto = "thin"

[profile.bench]
inherits = "release"
lto = "thin"
codegen-units = 16

[target.x86_64-unknown-linux-gnu]
# Lowered from haswell to x86-64-v2 so the binary runs on pre-Haswell CPUs
# (Sandy Bridge / Ivy Bridge), which only guarantee SSE4.2 globally. Hot
# AVX2 / FMA kernels in lance-linalg now carry their own
# #[target_feature(enable="avx,avx2,fma")] annotations and dispatch via
# SIMD_SUPPORT at runtime, so they remain fast on AVX2-capable hardware.
#
# `-D warnings` lives here (not in the workflow `env:` block) because cargo
# precedence rules make a process-level `RUSTFLAGS` env var fully replace the
# `[target.*]` rustflags from `.cargo/config.toml` rather than merge with
# them. Setting `RUSTFLAGS=-D warnings` in CI would silently drop the
# `target-cpu=x86-64-v2` baseline.
rustflags = ["-C", "target-cpu=x86-64-v2", "-D", "warnings"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=apple-m1", "-C", "target-feature=+neon,+fp16,+fhm,+dotprod"]
